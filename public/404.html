<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>File Not Found — CloudShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0a0a14;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f0f0f8}
    .card{text-align:center;padding:3rem 2rem;max-width:480px;width:90%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;backdrop-filter:blur(20px)}
    .num{font-family:'Syne',sans-serif;font-size:7rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;margin:1rem 0 .5rem}
    p{color:rgba(240,240,248,.6);line-height:1.6;margin-bottom:2rem}
    a{display:inline-block;background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;padding:.75rem 2rem;border-radius:50px;font-weight:600;transition:.2s;text-decoration:none}
    a:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(108,99,255,.5)}
  </style>
</head>
<body>
  <div class="card">
    <div class="num">404</div>
    <h1>File Not Found</h1>
    <p>The file you're looking for doesn't exist, has expired, or has been deleted by its owner.</p>
    <a href="/">← Return Home</a>
  </div>
</body>
</html>
