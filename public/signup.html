<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — CloudShare</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="auth-wrapper">
    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo"><span>☁️</span> CloudShare</a>
        <h1>Create account</h1>
        <p>Start sharing files in seconds</p>
      </div>

      <div id="alert" class="alert hidden"></div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" placeholder="Minimum 6 characters" required autocomplete="new-password"/>
            <button type="button" class="toggle-pass" onclick="togglePass('password')">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm" placeholder="Re-enter your password" required autocomplete="new-password"/>
            <button type="button" class="toggle-pass" onclick="togglePass('confirm')">👁</button>
          </div>
        </div>

        <!-- Password strength bar -->
        <div class="strength-bar-wrap">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">⏳ Creating...</span>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    fetch('/api/me').then(r => {
      if (r.ok) window.location.href = 'dashboard.html';
    });

    function togglePass(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    // Password strength indicator
    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const colors = ['', '#ff4757', '#ffa502', '#eccc68', '#2ed573', '#1e90ff'];
      bar.style.width = (strength / 5 * 100) + '%';
      bar.style.background = colors[strength] || '#555';
      label.textContent = val.length > 0 ? levels[strength] || 'Very Weak' : '';
      label.style.color = colors[strength] || '#aaa';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');
      const text = btn.querySelector('.btn-text');
      const loader = btn.querySelector('.btn-loader');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        alert.className = 'alert error';
        alert.textContent = '❌ Passwords do not match.';
        return;
      }

      text.classList.add('hidden');
      loader.classList.remove('hidden');
      btn.disabled = true;
      alert.className = 'alert hidden';

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();
        if (res.ok) {
          alert.className = 'alert success';
          alert.textContent = '✅ Account created! Redirecting...';
          setTimeout(() => window.location.href = 'dashboard.html', 900);
        } else {
          alert.className = 'alert error';
          alert.textContent = '❌ ' + data.error;
          text.classList.remove('hidden');
          loader.classList.add('hidden');
          btn.disabled = false;
        }
      } catch {
        alert.className = 'alert error';
        alert.textContent = '❌ Network error. Please try again.';
        text.classList.remove('hidden');
        loader.classList.add('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
